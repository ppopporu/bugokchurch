  <script>
    (function () {
      // ---------- Firebase 설정 ----------
      const firebaseConfig = {
        apiKey: "AIzaSyAvW6mQ17BLGmWijagPdWYLF8Y-kiJbOto",
        authDomain: "bugok-church.firebaseapp.com",
        projectId: "bugok-church",
        storageBucket: "bugok-church.firebasestorage.app",
        messagingSenderId: "517564170072",
        appId: "1:517564170072:web:1925ed566bffe76c812f2d",
        measurementId: "G-R0631SBEQ5",
      };

      firebase.initializeApp(firebaseConfig);
      const db = firebase.firestore();

      const COLL_NAME      = 'church_data';      // Firestore 컬렉션
      const PRIVATE_PREFIX = 'church_private:';  // localStorage 접두어

      // Firestore 문서 ID 안전화: '/', '.', '#', '[', ']', '$' 금지
      const sanitizeId = (key) => key.replace(/[\/\.#\[\]\$]/g, '_');

      window.storage = {
        async get(key, shared = false) {
          if (!shared) {
            const v = localStorage.getItem(PRIVATE_PREFIX + key);
            if (v === null) throw new Error('Key not found: ' + key);
            return { key, value: v, shared: false };
          }
          const snap = await db.collection(COLL_NAME).doc(sanitizeId(key)).get();
          if (!snap.exists) throw new Error('Key not found: ' + key);
          return { key, value: snap.data().value, shared: true };
        },

        async set(key, value, shared = false) {
          if (!shared) {
            localStorage.setItem(PRIVATE_PREFIX + key, value);
            return { key, value, shared: false };
          }
          await db.collection(COLL_NAME).doc(sanitizeId(key)).set({
            value,
            updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
          });
          return { key, value, shared: true };
        },

        async delete(key, shared = false) {
          if (!shared) {
            localStorage.removeItem(PRIVATE_PREFIX + key);
            return { key, deleted: true, shared: false };
          }
          await db.collection(COLL_NAME).doc(sanitizeId(key)).delete();
          return { key, deleted: true, shared: true };
        },

        async list(prefix = '', shared = false) {
          if (!shared) {
            const keys = [];
            for (let i = 0; i < localStorage.length; i++) {
              const lk = localStorage.key(i);
              if (lk && lk.startsWith(PRIVATE_PREFIX + prefix)) {
                keys.push(lk.slice(PRIVATE_PREFIX.length));
              }
            }
            return { keys, prefix, shared: false };
          }
          const snap = await db.collection(COLL_NAME).get();
          const safePrefix = sanitizeId(prefix);
          const keys = snap.docs.map(d => d.id).filter(id => id.startsWith(safePrefix));
          return { keys, prefix, shared: true };
        },
      };
    })();
  </script>

const fmtDate = (iso) => {
  if (!iso) return '';
  const d = new Date(iso);
  if (isNaN(d.getTime())) return iso;
  return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
};
const fmtDateTime = (iso) => {
  if (!iso) return '';
  const d = new Date(iso);
  if (isNaN(d.getTime())) return iso;
  return `${fmtDate(iso)} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
};
const relativeTime = (iso) => {
  if (!iso) return '';
  const diff = (Date.now() - new Date(iso).getTime()) / 1000;
  if (diff < 60) return '방금 전';
  if (diff < 3600) return `${Math.floor(diff/60)}분 전`;
  if (diff < 86400) return `${Math.floor(diff/3600)}시간 전`;
  if (diff < 604800) return `${Math.floor(diff/86400)}일 전`;
  return fmtDate(iso);
};

const extractYoutubeId = (input) => {
  if (!input) return null;
  const s = String(input).trim();
  const patterns = [
    /(?:youtube\.com\/watch\?v=)([\w-]{11})/,
    /(?:youtu\.be\/)([\w-]{11})/,
    /(?:youtube\.com\/embed\/)([\w-]{11})/,
    /(?:youtube\.com\/shorts\/)([\w-]{11})/,
    /^([\w-]{11})$/,
  ];
  for (const p of patterns) {
    const m = s.match(p);
    if (m) return m[1];
  }
  return null;
};

    try { await window.storage.set(key, JSON.stringify(value), shared); return true; }
    catch { return false; }
  },
  del: async (key, shared=true) => {
    try { await window.storage.delete(key, shared); return true; }
    catch { return false; }
  },
};

/* =========================================================================
   루트 컴포넌트
   ========================================================================= */
function ChurchApp() {
  /* ---------- 상태 ---------- */
  const [bootLoading, setBootLoading] = useState(true);
  const [route, setRoute] = useState({ name: 'home', params: {} });
  const [navOpen, setNavOpen] = useState(false);
  const [toast, setToast] = useState(null);

  const [currentUser, setCurrentUser] = useState(null);
  const [users,    setUsers]    = useState([]);
  const [notices,  setNotices]  = useState([]);
  const [videos,   setVideos]   = useState([]);
  const [qts,      setQts]      = useState([]);
  const [prayers,  setPrayers]  = useState([]);
  const [events,   setEvents]   = useState([]);
  const [settings, setSettings] = useState({ churchName: '부곡이웃교회', logoSymbol: '✚', tagline: '', heroVerse: '' });

  /* ---------- 초기 로드 / 시드 ---------- */
  useEffect(() => {
    (async () => {
      let u = await ss.get('app:users');
      if (!u) {
        const seed = seedData();
        await ss.set('app:users',    seed.users);
        await ss.set('app:notices',  seed.notices);
        await ss.set('app:videos',   seed.videos);
        await ss.set('app:qts',      seed.qts);
        await ss.set('app:prayers',  seed.prayers);
        await ss.set('app:events',   seed.events);
        await ss.set('app:settings', seed.settings);
        u = seed.users;
      }
      setUsers(u);
      setNotices ((await ss.get('app:notices'))  || []);
      setVideos  ((await ss.get('app:videos'))   || []);
      setQts     ((await ss.get('app:qts'))      || []);
      setPrayers ((await ss.get('app:prayers'))  || []);
      setEvents  ((await ss.get('app:events'))   || []);
      setSettings((await ss.get('app:settings')) || settings);

      // 세션 복원
      const sid = await ss.get('session:userId', false);
      if (sid) {
        const found = u.find(x => x.id === sid);
        if (found) setCurrentUser(found);
      }
      setBootLoading(false);
    })();
  }, []);

  /* ---------- 토스트 ---------- */
  const showToast = (msg, kind='success') => {
    setToast({ msg, kind, id: Date.now() });
    setTimeout(() => setToast(t => (t && t.msg === msg ? null : t)), 2600);
  };

  /* ---------- 인증 ---------- */
  const login = async (email, password) => {
    const u = users.find(x => x.email.toLowerCase() === email.toLowerCase() && x.password === password);
    if (!u) return { ok: false, error: '이메일 또는 비밀번호가 올바르지 않습니다.' };
    setCurrentUser(u);
    await ss.set('session:userId', u.id, false);
    showToast(`${u.name}님, 환영합니다.`);
    return { ok: true };
  };
  const signup = async (form) => {
    if (users.some(x => x.email.toLowerCase() === form.email.toLowerCase()))
      return { ok: false, error: '이미 가입된 이메일입니다.' };
    const newUser = {
      id: 'u_' + uid(), email: form.email, password: form.password, name: form.name,
      group: form.group, role: 'member', contact: form.contact || '',
      joinedAt: new Date().toISOString(),
    };
    const next = [...users, newUser];
    setUsers(next); await ss.set('app:users', next);
    setCurrentUser(newUser); await ss.set('session:userId', newUser.id, false);
    showToast(`가입 완료! ${newUser.name}님 환영합니다.`);
    return { ok: true };
  };
  const logout = async () => {
    setCurrentUser(null);
    await ss.del('session:userId', false);
    setRoute({ name: 'home', params: {} });
    showToast('로그아웃 되었습니다.');
  };

  /* ---------- CRUD 헬퍼 ---------- */
  const persist = {
    users:    async (next) => { setUsers(next);    await ss.set('app:users', next); },
    notices:  async (next) => { setNotices(next);  await ss.set('app:notices', next); },
    videos:   async (next) => { setVideos(next);   await ss.set('app:videos', next); },
    qts:      async (next) => { setQts(next);      await ss.set('app:qts', next); },
    prayers:  async (next) => { setPrayers(next);  await ss.set('app:prayers', next); },
    events:   async (next) => { setEvents(next);   await ss.set('app:events', next); },
    settings: async (next) => { setSettings(next); await ss.set('app:settings', next); },
  };

  const isAdmin = currentUser?.role === 'admin';

  /* =========================================================================
     렌더
     ========================================================================= */
  if (bootLoading) {
    return (
      <div className="min-h-screen bg-stone-50 flex items-center justify-center">
        <div className="text-slate-700 text-sm tracking-widest">불러오는 중…</div>
      </div>
    );
  }

  const ctx = {
    route, setRoute, currentUser, isAdmin,
    users, notices, videos, qts, prayers, events, settings,
    persist, showToast, login, signup, logout,
  };

  return (
    <div className="min-h-screen bg-stone-50 text-slate-900" style={{ fontFamily: "'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif" }}>
      <FontLoader />
      <Header ctx={ctx} navOpen={navOpen} setNavOpen={setNavOpen} />

      <main className="pb-20">
        {route.name === 'home'     && <HomePage     ctx={ctx} />}
        {route.name === 'login'    && <LoginPage    ctx={ctx} />}
        {route.name === 'signup'   && <SignupPage   ctx={ctx} />}
        {route.name === 'notices'  && <NoticesPage  ctx={ctx} />}
        {route.name === 'notice'   && <NoticeDetailPage ctx={ctx} />}
        {route.name === 'videos'   && <VideosPage   ctx={ctx} />}
        {route.name === 'qts'      && <QTPage       ctx={ctx} />}
        {route.name === 'qt'       && <QTDetailPage ctx={ctx} />}
        {route.name === 'prayers'  && <PrayerPage   ctx={ctx} />}
        {route.name === 'prayer'   && <PrayerDetailPage ctx={ctx} />}
        {route.name === 'events'   && <EventsPage   ctx={ctx} />}
        {route.name === 'me'       && <MyPage       ctx={ctx} />}
        {route.name === 'admin'    && <AdminPage    ctx={ctx} />}
      </main>

      <Footer ctx={ctx} />
      {toast && <Toast {...toast} onClose={() => setToast(null)} />}
    </div>
  );
}

/* ------------------------------ 폰트 로더 ------------------------------ */
function FontLoader() {
  useEffect(() => {
    const id = 'gf-noto-kr';
    if (!document.getElementById(id)) {
      const link = document.createElement('link');
      link.id = id; link.rel = 'stylesheet';
      link.href = 'https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Noto+Serif+KR:wght@400;600;900&display=swap';
      document.head.appendChild(link);
    }
  }, []);
  return null;
}

function Toast({ msg, kind, onClose }) {

function SignupPage({ ctx }) {
  const { signup, setRoute } = ctx;
  const [form, setForm] = useState({ email: '', password: '', name: '', group: 'women', contact: '' });
  const [err, setErr] = useState('');
  const [busy, setBusy] = useState(false);

  const submit = async (e) => {
    e.preventDefault();
    if (form.password.length < 4) { setErr('비밀번호는 4자 이상이어야 합니다.'); return; }
    setErr(''); setBusy(true);
    const r = await signup(form);
    setBusy(false);
    if (!r.ok) setErr(r.error);
    else setRoute({ name: 'home', params: {} });
  };
  const upd = (k, v) => setForm(f => ({ ...f, [k]: v }));

  return (
    <div className="min-h-[80vh] flex items-center justify-center px-4 py-12 bg-gradient-to-br from-stone-50 to-stone-100">
      <div className="w-full max-w-md">
        <div className="text-center mb-6">
          <div className="inline-flex w-14 h-14 rounded-xl bg-[#0f1d3d] items-center justify-center text-amber-300 text-3xl mb-3">✚</div>
          <h1 className="text-2xl font-bold text-slate-900" style={{ fontFamily: "'Noto Serif KR', serif" }}>회원가입</h1>
          <p className="text-sm text-slate-500 mt-1">간단한 정보로 즉시 가입</p>

function NoticesPage({ ctx }) {
  const { notices, persist, isAdmin, setRoute, showToast } = ctx;
  const [search, setSearch] = useState('');
  const [cat, setCat] = useState('전체');
  const [editing, setEditing] = useState(null); // 객체 또는 null
  const [creating, setCreating] = useState(false);

  const list = useMemo(() => {
    let arr = [...notices];
    if (cat !== '전체') arr = arr.filter(n => n.category === cat);
    if (search.trim()) {
      const s = search.toLowerCase();
      arr = arr.filter(n => n.title.toLowerCase().includes(s) || n.content.toLowerCase().includes(s));
    }
    arr.sort((a, b) => {
      if (!!b.isPinned !== !!a.isPinned) return (b.isPinned ? 1 : 0) - (a.isPinned ? 1 : 0);
      return b.createdAt.localeCompare(a.createdAt);
    });
    return arr;
  }, [notices, cat, search]);

  const onDelete = async (n) => {
    if (!confirm(`"${n.title}" 공지를 삭제하시겠습니까?`)) return;
    await persist.notices(notices.filter(x => x.id !== n.id));
    showToast('공지가 삭제되었습니다.');
  };

  return (
    <>
      <PageHeader icon={Bell} title="공지사항" subtitle="교회의 새로운 소식과 안내를 확인하세요"
        action={isAdmin && (
          <button onClick={() => setCreating(true)} className={btnAccent + ' flex items-center gap-1.5'}>
            <Plus size={16}/> 공지 등록
          </button>
        )}/>

      <div className="max-w-7xl mx-auto px-4 sm:px-6 py-8">
        {/* 필터 */}
        <div className="bg-white rounded-xl border border-stone-200 p-4 mb-6 flex flex-wrap gap-3 items-center">
          <div className="flex items-center gap-2 flex-1 min-w-[200px]">
            <Search size={16} className="text-slate-400"/>
            <input value={search} onChange={e => setSearch(e.target.value)} placeholder="제목·내용 검색"
                   className="flex-1 px-2 py-1.5 text-sm focus:outline-none bg-transparent"/>
          </div>
          <div className="flex items-center gap-1 flex-wrap">
            {['전체', ...NOTICE_CATEGORIES].map(c => (
              <button key={c} onClick={() => setCat(c)}
                className={`px-3 py-1.5 rounded-md text-xs font-semibold transition-colors ${
                  cat === c ? 'bg-[#0f1d3d] text-white' : 'bg-stone-100 text-slate-600 hover:bg-stone-200'
                }`}>{c}</button>
            ))}
          </div>
        </div>

        {/* 목록 */}
        <div className="bg-white rounded-xl border border-stone-200 overflow-hidden">
          {list.length === 0 ? <Empty icon={Bell} message="조건에 맞는 공지가 없습니다."/> : (
            <ul className="divide-y divide-stone-200">
              {list.map(n => (
                <li key={n.id} className="hover:bg-stone-50 transition-colors">
                  <div className="px-4 sm:px-6 py-4 flex items-start gap-4">
                    <button onClick={() => setRoute({ name: 'notice', params: { id: n.id } })} className="flex-1 min-w-0 text-left">
                      <div className="flex items-center gap-2 mb-1 flex-wrap">
                        {n.isPinned && (
                          <span className="inline-flex items-center gap-1 px-2 py-0.5 rounded text-[10px] font-bold bg-amber-100 text-amber-700">
                            <Pin size={10}/> 고정
                          </span>
                        )}
                        <span className="text-xs px-2 py-0.5 rounded bg-stone-100 text-slate-600 font-medium">{n.category}</span>
                        <span className="text-xs text-slate-500">{fmtDate(n.createdAt)} · {n.authorName}</span>
                      </div>
                      <div className="text-sm sm:text-base font-semibold text-slate-900 truncate">{n.title}</div>
                      <div className="text-xs text-slate-500 line-clamp-1 mt-1">{n.content}</div>
                    </button>
                    {isAdmin && (
                      <div className="flex gap-1 flex-shrink-0">
                        <button onClick={() => setEditing(n)} className="p-2 rounded-md hover:bg-stone-200 text-slate-600" title="수정"><Pencil size={14}/></button>
                        <button onClick={() => onDelete(n)} className="p-2 rounded-md hover:bg-rose-50 text-rose-600" title="삭제"><Trash2 size={14}/></button>
                      </div>
                    )}
                  </div>
                </li>
              ))}
            </ul>
          )}
        </div>
      </div>

      <NoticeFormModal open={creating || !!editing} editing={editing} onClose={() => { setCreating(false); setEditing(null); }} ctx={ctx} />
    </>
  );
}

function NoticeFormModal({ open, editing, onClose, ctx }) {
  const { notices, persist, currentUser, showToast } = ctx;
  const [form, setForm] = useState({ title: '', content: '', category: '일반', isPinned: false });

  useEffect(() => {
    if (editing) setForm({ title: editing.title, content: editing.content, category: editing.category, isPinned: editing.isPinned });
    else setForm({ title: '', content: '', category: '일반', isPinned: false });
  }, [editing, open]);

  const submit = async (e) => {
    e.preventDefault();
    if (editing) {
      const next = notices.map(n => n.id === editing.id ? { ...n, ...form } : n);
      await persist.notices(next); showToast('공지가 수정되었습니다.');
    } else {
      const item = { id: uid(), ...form, authorId: currentUser.id, authorName: currentUser.name, createdAt: new Date().toISOString() };
      await persist.notices([item, ...notices]); showToast('공지가 등록되었습니다.');
    }
    onClose();
  };

  return (
    <Modal open={open} onClose={onClose} title={editing ? '공지 수정' : '공지 등록'}>
      <form onSubmit={submit}>
        <Field label="제목"><input required value={form.title} onChange={e => setForm({...form, title: e.target.value})} className={inputCls}/></Field>
        <Field label="카테고리">
          <select value={form.category} onChange={e => setForm({...form, category: e.target.value})} className={inputCls}>
            {NOTICE_CATEGORIES.map(c => <option key={c} value={c}>{c}</option>)}
          </select>
        </Field>
        <Field label="내용"><textarea required rows={8} value={form.content} onChange={e => setForm({...form, content: e.target.value})} className={inputCls} style={{resize:'vertical'}}/></Field>
        <label className="flex items-center gap-2 mb-4 text-sm text-slate-700">
          <input type="checkbox" checked={form.isPinned} onChange={e => setForm({...form, isPinned: e.target.checked})} className="w-4 h-4 accent-[#0f1d3d]"/>
          상단 고정
        </label>
        <div className="flex gap-2 justify-end">
          <button type="button" onClick={onClose} className={btnGhost}>취소</button>
          <button className={btnPri}>{editing ? '저장' : '등록'}</button>
        </div>
      </form>
    </Modal>
  );
}

      </div>
    );
  }

  // RLS 시뮬레이션: 본인 목장 글만 조회 (관리자는 전체 조회 가능)
  const visible = useMemo(() => {
    let arr = [...qts];
    if (isAdmin && groupFilter !== 'mine') {
      // pass through
    } else {
      arr = arr.filter(q => q.group === currentUser.group);
    }
    if (isAdmin && groupFilter !== 'mine' && groupFilter !== 'all') {
      arr = arr.filter(q => q.group === groupFilter);
    }
    arr.sort((a,b) => b.createdAt.localeCompare(a.createdAt));
    return arr;
  }, [qts, currentUser, isAdmin, groupFilter]);

  const onDelete = async (q) => {
    if (q.authorId !== currentUser.id && !isAdmin) return;
    if (!confirm('삭제하시겠습니까?')) return;
    await persist.qts(qts.filter(x => x.id !== q.id));

  const myGroupName = currentUser.group ? groupName(currentUser.group) : '미지정';

  return (
    <>
      <PageHeader icon={BookOpen} title="QT 나눔"
        subtitle={isAdmin ? '관리자는 전체 목장 QT를 열람할 수 있습니다.' : `${myGroupName} 성도들과 말씀 묵상을 나눠보세요`}
        action={

            <button onClick={() => setGroupFilter('mine')} className={`px-3 py-1.5 rounded-md text-xs font-semibold ${groupFilter==='mine'?'bg-[#0f1d3d] text-white':'bg-stone-100 text-slate-600'}`}>내 목장</button>
            <button onClick={() => setGroupFilter('all')} className={`px-3 py-1.5 rounded-md text-xs font-semibold ${groupFilter==='all'?'bg-[#0f1d3d] text-white':'bg-stone-100 text-slate-600'}`}>전체</button>
            {GROUPS.map(g => (
              <button key={g.id} onClick={() => setGroupFilter(g.id)} className={`px-3 py-1.5 rounded-md text-xs font-semibold ${groupFilter===g.id?'bg-[#0f1d3d] text-white':'bg-stone-100 text-slate-600'}`}>{g.name}</button>
            ))}
          </div>
        )}

        {!currentUser.group && !isAdmin && (
          <div className="bg-amber-50 border border-amber-200 rounded-md p-4 text-sm text-amber-800 mb-5">
            아직 목장이 지정되지 않았습니다. 마이페이지에서 목장을 선택해 주세요.
          </div>
        )}

        {visible.length === 0 ? <Empty icon={BookOpen} message="아직 등록된 QT가 없습니다. 첫 글을 남겨보세요!"/> : (
          <div className="grid sm:grid-cols-2 lg:grid-cols-3 gap-5">
            {visible.map(q => (
              <div key={q.id} className="bg-white rounded-xl border border-stone-200 hover:shadow-md transition-shadow flex flex-col">
                <button onClick={() => setRoute({ name: 'qt', params: { id: q.id } })} className="text-left p-5 flex-1">
                  <div className="flex items-center gap-2 mb-2">
                    <span className="text-[10px] font-bold px-2 py-0.5 rounded bg-amber-100 text-amber-700">{groupName(q.group)}</span>
                    <span className="text-xs text-slate-500">{relativeTime(q.createdAt)}</span>
                  </div>
                  {q.scripture && <div className="text-xs text-[#0f1d3d] font-bold mb-1">📖 {q.scripture}</div>}
                  <h3 className="text-base font-bold text-slate-900 mb-2 line-clamp-2" style={{ fontFamily: "'Noto Serif KR', serif" }}>{q.title}</h3>
                  <p className="text-sm text-slate-600 line-clamp-3 leading-relaxed">{q.content}</p>
                </button>
                <div className="px-5 py-3 border-t border-stone-100 flex items-center justify-between bg-stone-50/50 rounded-b-xl">
                  <div className="text-xs text-slate-500">
                    <User size={11} className="inline mr-1"/> {q.authorName}
                    <span className="mx-1.5">·</span>
                    <MessageCircle size={11} className="inline mr-0.5"/> {q.comments?.length || 0}
                  </div>
                  {(q.authorId === currentUser.id || isAdmin) && (
                    <div className="flex gap-1">
                      <button onClick={() => setEditing(q)} className="p-1 rounded hover:bg-stone-200 text-slate-600"><Pencil size={12}/></button>
                      <button onClick={() => onDelete(q)} className="p-1 rounded hover:bg-rose-100 text-rose-600"><Trash2 size={12}/></button>
                    </div>
                  )}
                </div>
              </div>
            ))}
          </div>
        )}
      </div>

      <QTFormModal open={creating || !!editing} editing={editing} onClose={() => { setCreating(false); setEditing(null); }} ctx={ctx} />
    </>
  );
}

function QTFormModal({ open, editing, onClose, ctx }) {
  const { qts, persist, currentUser, showToast } = ctx;
  const [form, setForm] = useState({ title: '', scripture: '', content: '' });

  useEffect(() => {
    if (editing) setForm({ title: editing.title, scripture: editing.scripture || '', content: editing.content });
    else setForm({ title: '', scripture: '', content: '' });
  }, [editing, open]);

  const submit = async (e) => {
    e.preventDefault();
    if (editing) {
      const next = qts.map(q => q.id === editing.id ? { ...q, ...form } : q);
      await persist.qts(next); showToast('QT가 수정되었습니다.');
    } else {
      if (!currentUser.group) { showToast('목장 정보가 필요합니다. 마이페이지에서 설정해주세요.', 'error'); return; }
      const item = { id: uid(), ...form, group: currentUser.group, authorId: currentUser.id, authorName: currentUser.name, createdAt: new Date().toISOString(), comments: [] };
      await persist.qts([item, ...qts]); showToast('QT가 등록되었습니다.');
    }
    onClose();
  };

  return (
    <Modal open={open} onClose={onClose} title={editing ? 'QT 수정' : 'QT 작성'}>
      <form onSubmit={submit}>
        <Field label="말씀 본문" hint="예: 시편 23:1-6"><input value={form.scripture} onChange={e => setForm({...form, scripture: e.target.value})} className={inputCls}/></Field>
        <Field label="제목"><input required value={form.title} onChange={e => setForm({...form, title: e.target.value})} className={inputCls} placeholder="오늘 묵상의 주제"/></Field>
        <Field label="묵상 / 적용"><textarea required rows={9} value={form.content} onChange={e => setForm({...form, content: e.target.value})} className={inputCls} style={{resize:'vertical'}} placeholder="오늘 말씀이 나에게 주신 의미와 적용을 적어보세요."/></Field>
        <div className="flex gap-2 justify-end">
          <button type="button" onClick={onClose} className={btnGhost}>취소</button>
          <button className={btnPri}>{editing ? '저장' : '등록'}</button>
        </div>
      </form>
    </Modal>
  );
}

            <div className="inline-flex items-center gap-2 px-4 py-2 rounded-md bg-[#0f1d3d] text-white mb-4">

          <h1 className="text-2xl sm:text-3xl font-bold text-slate-900 leading-tight" style={{ fontFamily: "'Noto Serif KR', serif" }}>{q.title}</h1>
          <div className="mt-6 pt-6 border-t border-stone-200 whitespace-pre-wrap text-slate-700 leading-relaxed">{q.content}</div>
        </div>

        {/* 댓글 */}
        <div className="bg-stone-50 px-6 sm:px-10 py-6 border-t border-stone-200">
          <h2 className="text-sm font-bold text-slate-800 mb-4 flex items-center gap-1.5">

          </h2>
          {fresh?.comments?.length > 0 && (
            <ul className="space-y-3 mb-4">
              {fresh.comments.map(c => (
                <li key={c.id} className="bg-white rounded-md p-3 border border-stone-200 group">
                  <div className="flex items-center justify-between mb-1">
                    <div className="text-xs font-semibold text-[#0f1d3d]">{c.authorName}</div>
                    <div className="text-[10px] text-slate-400 flex items-center gap-2">

function PrayerPage({ ctx }) {
  const { prayers, currentUser, persist, setRoute, isAdmin, showToast } = ctx;
  const [creating, setCreating] = useState(false);
  const [editing, setEditing] = useState(null);

  if (!currentUser) {
    return (
      <div className="max-w-3xl mx-auto px-4 py-16 text-center">
        <HandHeart size={36} className="mx-auto mb-3 text-slate-300"/>
        <div className="text-slate-700 mb-4">기도게시판은 로그인 후 이용 가능합니다.</div>
        <button onClick={() => setRoute({ name: 'login', params: {} })} className={btnPri}>로그인</button>
      </div>
    );
  }

  const list = useMemo(() => [...prayers].sort((a,b) => b.createdAt.localeCompare(a.createdAt)), [prayers]);

  const togglePray = async (p) => {
    const has = p.prayedBy?.includes(currentUser.id);
    const next = prayers.map(x => x.id === p.id
      ? { ...x, prayedBy: has ? (x.prayedBy||[]).filter(i => i !== currentUser.id) : [...(x.prayedBy||[]), currentUser.id] }
      : x);
    await persist.prayers(next);
  };

  return (
    <>
      <PageHeader icon={HandHeart} title="기도게시판" subtitle="서로의 기도제목을 나누고 함께 중보합시다"
        action={<button onClick={() => setCreating(true)} className={btnAccent + ' flex items-center gap-1.5'}><Plus size={16}/> 기도제목 등록</button>}/>

      <div className="max-w-5xl mx-auto px-4 sm:px-6 py-8">
        {list.length === 0 ? <Empty icon={HandHeart} message="아직 등록된 기도제목이 없습니다."/> : (
          <ul className="space-y-4">
            {list.map(p => {
              const prayed = p.prayedBy?.includes(currentUser.id);
              return (
                <li key={p.id} className="bg-white rounded-xl border border-stone-200 overflow-hidden hover:shadow-md transition-shadow">
                  <div className="p-5">
                    <button onClick={() => setRoute({ name: 'prayer', params: { id: p.id } })} className="w-full text-left">
                      <div className="flex items-center justify-between gap-2 mb-2">
                        <div className="text-xs text-slate-500">
                          <span className={p.isAnonymous ? 'italic' : 'font-semibold text-[#0f1d3d]'}>{p.isAnonymous ? '익명의 성도' : p.authorName}</span>
                          <span className="mx-1.5">·</span>{relativeTime(p.createdAt)}
                        </div>
                        {(p.authorId === currentUser.id || isAdmin) && (
                          <div className="flex gap-1" onClick={e => e.stopPropagation()}>
                            <button onClick={() => setEditing(p)} className="p-1 rounded hover:bg-stone-100 text-slate-600"><Pencil size={12}/></button>
                            <button onClick={async () => {
                              if (!confirm('삭제?')) return;
                              await persist.prayers(prayers.filter(x => x.id !== p.id));
                              showToast('삭제되었습니다.');
                            }} className="p-1 rounded hover:bg-rose-100 text-rose-600"><Trash2 size={12}/></button>
                          </div>
                        )}
                      </div>
                      <h3 className="text-base sm:text-lg font-bold text-slate-900 mb-1" style={{ fontFamily: "'Noto Serif KR', serif" }}>{p.title}</h3>
                      <p className="text-sm text-slate-600 line-clamp-2 leading-relaxed">{p.content}</p>
                    </button>
                    <div className="mt-4 pt-4 border-t border-stone-100 flex items-center justify-between">
                      <button onClick={() => togglePray(p)}
                        className={`flex items-center gap-1.5 px-3 py-1.5 rounded-full text-xs font-semibold transition-colors ${
                          prayed ? 'bg-rose-100 text-rose-700' : 'bg-stone-100 text-slate-600 hover:bg-rose-50 hover:text-rose-600'
                        }`}>
                        <Heart size={13} fill={prayed ? 'currentColor' : 'none'}/>
                        {prayed ? '함께 기도중' : '기도해요'} · {p.prayedBy?.length || 0}
                      </button>
                      <button onClick={() => setRoute({ name: 'prayer', params: { id: p.id } })}
                        className="text-xs text-slate-500 hover:text-[#0f1d3d] flex items-center gap-1">
                        <MessageCircle size={12}/> {p.comments?.length || 0}개의 응원
                      </button>
                    </div>
                  </div>
                </li>
              );
            })}
          </ul>
        )}
      </div>

      <PrayerFormModal open={creating || !!editing} editing={editing} onClose={() => { setCreating(false); setEditing(null); }} ctx={ctx} />
    </>
  );
}

/* ============================== 교회 행사 ============================== */
function EventsPage({ ctx }) {
  const { events, persist, isAdmin, showToast } = ctx;
  const [creating, setCreating] = useState(false);
  const [editing, setEditing] = useState(null);
  const today = todayISO();

  const upcoming = useMemo(() => events.filter(e => (e.endDate || e.startDate) >= today)
    .sort((a,b) => a.startDate.localeCompare(b.startDate)), [events, today]);
  const past = useMemo(() => events.filter(e => (e.endDate || e.startDate) < today)
    .sort((a,b) => b.startDate.localeCompare(a.startDate)), [events, today]);

  const onDelete = async (e) => {
    if (!confirm('삭제?')) return;
    await persist.events(events.filter(x => x.id !== e.id));
    showToast('삭제되었습니다.');
  };

  return (
    <>
      <PageHeader icon={Calendar} title="교회 행사" subtitle="다가오는 행사와 지난 행사를 한눈에"
        action={isAdmin && <button onClick={() => setCreating(true)} className={btnAccent + ' flex items-center gap-1.5'}><Plus size={16}/> 행사 등록</button>}/>

      <div className="max-w-7xl mx-auto px-4 sm:px-6 py-8 space-y-10">
        {/* 다가오는 행사 */}
        <section>
          <h2 className="text-xl font-bold text-slate-900 mb-4 flex items-center gap-2" style={{ fontFamily: "'Noto Serif KR', serif" }}>
            <span className="w-1.5 h-6 bg-amber-500 rounded-full"></span> 다가오는 행사 ({upcoming.length})
          </h2>
          {upcoming.length === 0 ? <Empty icon={Calendar} message="예정된 행사가 없습니다."/> : (
            <div className="grid sm:grid-cols-2 lg:grid-cols-3 gap-4">
              {upcoming.map(e => <EventCard key={e.id} e={e} onEdit={() => setEditing(e)} onDelete={() => onDelete(e)} canEdit={isAdmin} upcoming/>)}
            </div>
          )}
        </section>

        {/* 지난 행사 */}
        <section>
          <h2 className="text-xl font-bold text-slate-900 mb-4 flex items-center gap-2" style={{ fontFamily: "'Noto Serif KR', serif" }}>
            <span className="w-1.5 h-6 bg-stone-400 rounded-full"></span> 지난 행사 ({past.length})
          </h2>
          {past.length === 0 ? <Empty icon={Calendar} message="지난 행사 기록이 없습니다."/> : (
            <div className="grid sm:grid-cols-2 lg:grid-cols-3 gap-4">
              {past.map(e => <EventCard key={e.id} e={e} onEdit={() => setEditing(e)} onDelete={() => onDelete(e)} canEdit={isAdmin}/>)}
            </div>
          )}
        </section>
      </div>

      <EventFormModal open={creating || !!editing} editing={editing} onClose={() => { setCreating(false); setEditing(null); }} ctx={ctx} />
    </>
  );
}

function EventCard({ e, onEdit, onDelete, canEdit, upcoming }) {
  const d = new Date(e.startDate);
  const days = e.startDate !== e.endDate ? `${fmtDate(e.startDate)} ~ ${fmtDate(e.endDate)}` : fmtDate(e.startDate);
  return (
    <div className={`bg-white rounded-xl border ${upcoming ? 'border-stone-200' : 'border-stone-200 opacity-90'} p-5 hover:shadow-md transition-shadow flex gap-4`}>
      <div className={`flex-shrink-0 w-16 text-center rounded-lg py-2 ${upcoming ? 'bg-[#0f1d3d] text-white' : 'bg-stone-200 text-slate-600'}`}>
        <div className={`text-[10px] tracking-widest ${upcoming ? 'text-amber-300' : 'text-slate-500'}`}>{d.toLocaleDateString('ko',{month:'short'})}</div>
        <div className="text-2xl font-bold leading-none mt-1">{d.getDate()}</div>
      </div>
      <div className="flex-1 min-w-0">
        <div className="flex items-center gap-2 mb-1">
          <span className="text-[10px] font-bold px-1.5 py-0.5 rounded bg-amber-100 text-amber-700">{e.category}</span>
          {upcoming && <span className="text-[10px] font-bold px-1.5 py-0.5 rounded bg-emerald-100 text-emerald-700">예정</span>}
        </div>
        <h3 className="text-base font-bold text-slate-900 mb-1.5" style={{ fontFamily: "'Noto Serif KR', serif" }}>{e.title}</h3>
        <div className="text-xs text-slate-500 mb-1 flex items-center gap-1"><Clock size={11}/> {days}</div>
        {e.location && <div className="text-xs text-slate-500 flex items-center gap-1"><MapPin size={11}/> {e.location}</div>}
        {e.description && <p className="text-xs text-slate-600 mt-2 line-clamp-2">{e.description}</p>}
        {canEdit && (
          <div className="mt-3 flex gap-1 justify-end">
            <button onClick={onEdit} className="p-1 rounded hover:bg-stone-100 text-slate-600"><Pencil size={13}/></button>
            <button onClick={onDelete} className="p-1 rounded hover:bg-rose-100 text-rose-600"><Trash2 size={13}/></button>
          </div>
        )}
      </div>
    </div>
  );
}

function EventFormModal({ open, editing, onClose, ctx }) {
  const { events, persist, showToast } = ctx;
  const [form, setForm] = useState({ title: '', category: '예배', startDate: todayISO(), endDate: todayISO(), location: '', description: '' });

  useEffect(() => {
    if (editing) setForm({ ...editing });
    else setForm({ title: '', category: '예배', startDate: todayISO(), endDate: todayISO(), location: '', description: '' });
  }, [editing, open]);

  const submit = async (e) => {
    e.preventDefault();
    if (form.endDate < form.startDate) { showToast('종료일이 시작일보다 빠를 수 없습니다.', 'error'); return; }
    if (editing) {
      const next = events.map(x => x.id === editing.id ? { ...x, ...form } : x);
      await persist.events(next); showToast('행사가 수정되었습니다.');
    } else {
      const item = { id: uid(), ...form };
      await persist.events([item, ...events]); showToast('행사가 등록되었습니다.');
    }
    onClose();
  };

  return (
    <Modal open={open} onClose={onClose} title={editing ? '행사 수정' : '행사 등록'}>
      <form onSubmit={submit}>
        <Field label="행사명"><input required value={form.title} onChange={e => setForm({...form, title: e.target.value})} className={inputCls}/></Field>
        <Field label="분류">
          <select value={form.category} onChange={e => setForm({...form, category: e.target.value})} className={inputCls}>
            {EVENT_CATEGORIES.map(c => <option key={c} value={c}>{c}</option>)}
          </select>
        </Field>
        <div className="grid grid-cols-2 gap-3">
          <Field label="시작일"><input type="date" required value={form.startDate} onChange={e => setForm({...form, startDate: e.target.value})} className={inputCls}/></Field>
          <Field label="종료일"><input type="date" required value={form.endDate} onChange={e => setForm({...form, endDate: e.target.value})} className={inputCls}/></Field>
        </div>
        <Field label="장소"><input value={form.location} onChange={e => setForm({...form, location: e.target.value})} className={inputCls}/></Field>
        <Field label="설명"><textarea rows={4} value={form.description} onChange={e => setForm({...form, description: e.target.value})} className={inputCls} style={{resize:'vertical'}}/></Field>
        <div className="flex gap-2 justify-end">
          <button type="button" onClick={onClose} className={btnGhost}>취소</button>
          <button className={btnPri}>{editing ? '저장' : '등록'}</button>
        </div>
      </form>
    </Modal>
  );
}

function MyPage({ ctx }) {
  const { currentUser, users, persist, setRoute, showToast } = ctx;
  if (!currentUser) {
    return (
      <div className="max-w-3xl mx-auto px-4 py-16 text-center">
        <div className="text-slate-700 mb-4">로그인이 필요합니다.</div>
        <button onClick={() => setRoute({ name: 'login', params: {} })} className={btnPri}>로그인</button>
      </div>
    );
  }
  const [form, setForm] = useState({ name: currentUser.name, group: currentUser.group || 'women', contact: currentUser.contact || '' });
  const [pwForm, setPwForm] = useState({ current: '', next: '', confirm: '' });

  const save = async (e) => {
    e.preventDefault();
    const next = users.map(u => u.id === currentUser.id ? { ...u, ...form } : u);
    await persist.users(next); showToast('정보가 수정되었습니다.');
    // currentUser sync는 다음 인터랙션 시점에 반영되도록 두고, 즉시 반영을 위해 새로 찾음
    const me = next.find(u => u.id === currentUser.id);
    ctx.currentUser = me;
  };
  const changePw = async (e) => {
    e.preventDefault();
    if (pwForm.current !== currentUser.password) { showToast('현재 비밀번호가 올바르지 않습니다.', 'error'); return; }
    if (pwForm.next.length < 4) { showToast('새 비밀번호는 4자 이상.', 'error'); return; }
    if (pwForm.next !== pwForm.confirm) { showToast('비밀번호 확인이 일치하지 않습니다.', 'error'); return; }
    const next = users.map(u => u.id === currentUser.id ? { ...u, password: pwForm.next } : u);
    await persist.users(next);
    setPwForm({ current: '', next: '', confirm: '' });
    showToast('비밀번호가 변경되었습니다.');
  };

  return (
    <>
      <PageHeader icon={User} title="마이페이지" subtitle="개인 정보를 관리하세요" />
      <div className="max-w-3xl mx-auto px-4 sm:px-6 py-8 space-y-6">
        <div className="bg-white rounded-2xl border border-stone-200 p-6 shadow-sm">
          <h2 className="text-base font-bold mb-4 text-slate-900" style={{ fontFamily: "'Noto Serif KR', serif" }}>기본 정보</h2>
          <form onSubmit={save}>
            <Field label="이메일">
              <input value={currentUser.email} disabled className={inputCls + ' bg-stone-50 text-slate-500'}/>
            </Field>
            <Field label="이름"><input required value={form.name} onChange={e => setForm({...form, name: e.target.value})} className={inputCls}/></Field>
            <Field label="목장">
              <select value={form.group} onChange={e => setForm({...form, group: e.target.value})} className={inputCls}>
                {GROUPS.map(g => <option key={g.id} value={g.id}>{g.name}</option>)}
              </select>
            </Field>
            <Field label="연락처"><input value={form.contact} onChange={e => setForm({...form, contact: e.target.value})} className={inputCls} placeholder="010-0000-0000"/></Field>
            <button className={btnPri}>저장</button>
          </form>
        </div>

        <div className="bg-white rounded-2xl border border-stone-200 p-6 shadow-sm">
          <h2 className="text-base font-bold mb-4 text-slate-900" style={{ fontFamily: "'Noto Serif KR', serif" }}>비밀번호 변경</h2>
          <form onSubmit={changePw}>
            <Field label="현재 비밀번호"><input type="password" value={pwForm.current} onChange={e => setPwForm({...pwForm, current: e.target.value})} className={inputCls}/></Field>
            <Field label="새 비밀번호"><input type="password" value={pwForm.next} onChange={e => setPwForm({...pwForm, next: e.target.value})} className={inputCls}/></Field>
            <Field label="새 비밀번호 확인"><input type="password" value={pwForm.confirm} onChange={e => setPwForm({...pwForm, confirm: e.target.value})} className={inputCls}/></Field>
            <button className={btnPri}>비밀번호 변경</button>
          </form>
        </div>
      </div>
    </>
  );
}

function AdminMembers({ ctx }) {
  const { users, persist, currentUser, showToast } = ctx;
  const [search, setSearch] = useState('');
  const [groupFilter, setGroupFilter] = useState('all');

  const list = useMemo(() => {
    let arr = [...users];
    if (groupFilter !== 'all') arr = groupFilter === 'none' ? arr.filter(u => !u.group) : arr.filter(u => u.group === groupFilter);
    if (search.trim()) {
      const s = search.toLowerCase();
      arr = arr.filter(u => u.name.toLowerCase().includes(s) || u.email.toLowerCase().includes(s));
    }
    arr.sort((a,b) => (a.role==='admin'?-1:1) - (b.role==='admin'?-1:1) || a.name.localeCompare(b.name));
    return arr;
  }, [users, search, groupFilter]);

  const setGroup = async (u, g) => {
    const next = users.map(x => x.id === u.id ? { ...x, group: g === '' ? null : g } : x);
    await persist.users(next); showToast(`${u.name}님의 목장이 변경되었습니다.`);
  };
  const setRole = async (u, role) => {
    if (u.id === currentUser.id && role !== 'admin') {
      showToast('자기 자신의 관리자 권한은 해제할 수 없습니다.', 'error'); return;
    }
    const next = users.map(x => x.id === u.id ? { ...x, role } : x);
    await persist.users(next); showToast('권한이 변경되었습니다.');
  };
  const removeUser = async (u) => {
    if (u.id === currentUser.id) { showToast('자기 자신은 삭제할 수 없습니다.', 'error'); return; }
    if (!confirm(`${u.name}(${u.email}) 회원을 삭제하시겠습니까?`)) return;
    await persist.users(users.filter(x => x.id !== u.id));
    showToast('회원이 삭제되었습니다.');

  return (
    <div>
      <div className="bg-white rounded-xl border border-stone-200 p-4 mb-4 flex flex-wrap gap-3 items-center">
        <div className="flex items-center gap-2 flex-1 min-w-[220px]">

                 className="flex-1 px-2 py-1.5 text-sm focus:outline-none bg-transparent"/>
        </div>
        <select value={groupFilter} onChange={e => setGroupFilter(e.target.value)} className="px-3 py-1.5 rounded-md border border-stone-300 text-sm">
          <option value="all">전체 목장</option>
          {GROUPS.map(g => <option key={g.id} value={g.id}>{g.name}</option>)}
          <option value="none">미지정</option>
        </select>
      </div>

      <div className="bg-white rounded-xl border border-stone-200 overflow-hidden">
        <div className="overflow-x-auto">
          <table className="w-full text-sm">
            <thead className="bg-stone-50 text-slate-600">
              <tr>
                <th className="px-4 py-3 text-left font-semibold">이름</th>
                <th className="px-4 py-3 text-left font-semibold">이메일</th>
                <th className="px-4 py-3 text-left font-semibold">목장</th>
                <th className="px-4 py-3 text-left font-semibold">권한</th>
                <th className="px-4 py-3 text-left font-semibold">가입일</th>
                <th className="px-4 py-3 text-right font-semibold">관리</th>
              </tr>
            </thead>
            <tbody className="divide-y divide-stone-100">
              {list.map(u => (
                <tr key={u.id} className="hover:bg-stone-50">
                  <td className="px-4 py-3 font-semibold text-slate-900">{u.name}</td>
                  <td className="px-4 py-3 text-slate-600">{u.email}</td>
                  <td className="px-4 py-3">
                    <select value={u.group || ''} onChange={e => setGroup(u, e.target.value)}
                            className="px-2 py-1 rounded border border-stone-300 text-xs">
                      <option value="">미지정</option>
                      {GROUPS.map(g => <option key={g.id} value={g.id}>{g.name}</option>)}
                    </select>
                  </td>
                  <td className="px-4 py-3">
                    <select value={u.role} onChange={e => setRole(u, e.target.value)}
                            className={`px-2 py-1 rounded border text-xs ${u.role==='admin' ? 'bg-amber-50 border-amber-300 text-amber-800 font-semibold':'border-stone-300'}`}>
                      <option value="member">성도</option>
                      <option value="admin">관리자</option>
                    </select>
                  </td>
                  <td className="px-4 py-3 text-slate-500 text-xs">{fmtDate(u.joinedAt)}</td>
                  <td className="px-4 py-3 text-right">
                    <button onClick={() => removeUser(u)}
                            className="p-1.5 rounded hover:bg-rose-50 text-rose-600" title="회원 삭제">
                      <Trash2 size={14}/>
                    </button>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
        {list.length === 0 && <Empty icon={Users} message="조건에 맞는 회원이 없습니다."/>}
      </div>
    </div>
  );
}

function AdminSettings({ ctx }) {
  const { settings, persist, showToast } = ctx;
  const [form, setForm] = useState({ ...settings });
  const fileRef = useRef(null);

  const save = async (e) => {
    e.preventDefault();
    await persist.settings(form);
    showToast('설정이 저장되었습니다.');
  };
  const onLogoUpload = (e) => {
    const f = e.target.files?.[0];
    if (!f) return;
    if (f.size > 200 * 1024) { showToast('파일은 200KB 이하만 가능합니다.', 'error'); return; }
    const reader = new FileReader();
    reader.onload = () => setForm(s => ({ ...s, logoImage: reader.result }));
    reader.readAsDataURL(f);
  };

  return (
    <form onSubmit={save} className="bg-white rounded-2xl border border-stone-200 p-6 max-w-2xl">
      <h3 className="text-base font-bold text-slate-900 mb-4" style={{ fontFamily: "'Noto Serif KR', serif" }}>교회 정보</h3>
      <Field label="교회 이름"><input required value={form.churchName} onChange={e => setForm({...form, churchName: e.target.value})} className={inputCls}/></Field>
      <Field label="로고 심볼" hint="한 글자 또는 이모지 (예: ✚, ✦, ⛪)">
        <input value={form.logoSymbol || ''} onChange={e => setForm({...form, logoSymbol: e.target.value.slice(0,2)})} className={inputCls + ' text-center text-2xl font-bold'}/>
      </Field>
      <Field label="태그라인 (한 줄 소개)">
        <input value={form.tagline || ''} onChange={e => setForm({...form, tagline: e.target.value})} className={inputCls}/>
      </Field>
      <Field label="히어로 말씀구절">
        <input value={form.heroVerse || ''} onChange={e => setForm({...form, heroVerse: e.target.value})} className={inputCls} placeholder='"..." — 마태복음 22:39'/>
      </Field>

      <div className="bg-stone-50 rounded-md p-4 mb-4">
        <div className="text-xs font-semibold text-slate-700 mb-2">미리보기</div>
        <div className="flex items-center gap-3">
          <div className="w-12 h-12 rounded-lg bg-gradient-to-br from-amber-400 to-amber-600 flex items-center justify-center text-[#0f1d3d] text-2xl font-bold shadow">
            {form.logoSymbol || '✚'}
          </div>
          <div>
            <div className="text-base font-bold text-[#0f1d3d]" style={{ fontFamily: "'Noto Serif KR', serif" }}>{form.churchName}</div>
            <div className="text-xs text-slate-500">{form.tagline}</div>
          </div>
        </div>
      </div>

      <div className="flex gap-2 justify-end">
        <button type="button" onClick={() => setForm({ ...settings })} className={btnGhost}>되돌리기</button>
        <button className={btnPri}>저장</button>
      </div>
    </form>
  );
}

  /* ============================================================
     ====== 렌더링 시작 ==========================================
     ============================================================ */
  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(<ChurchApp />);
  </script>
</body>
</html>
